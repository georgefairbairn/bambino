name: Development build

# Manual dispatch only. The `development-device` profile produces a dev
# client used for connecting Metro to a physical iPhone — you only need
# a fresh one when native config changes (app.json plugins, new native
# deps, etc.). JS-only changes don't require a rebuild. Auto-on-master
# was burning EAS build credits on every merge.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to build (defaults to master)"
        required: false
        default: "master"

jobs:
  build:
    name: Build development client (iOS)
    runs-on: ubuntu-latest
    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "EXPO_TOKEN is not set. Add it at https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build development client
        run: eas build --platform ios --profile development-device --non-interactive --no-wait
